[package]
name = "zguide-tokio-09-titanic"
version = "0.0.0"
edition.workspace = true
publish = false

[dependencies]
omq = { version = "0.12.1", path = "../../../omq", default-features = false, features = ["tokio-backend"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time"] }
bytes = "1"

[[bin]]
name = "zg09_frontend"
path = "frontend.rs"

[[bin]]
name = "zg09_dispatcher"
path = "dispatcher.rs"

[[bin]]
name = "zg09_client"
path = "client.rs"



[lints]
workspace = true
