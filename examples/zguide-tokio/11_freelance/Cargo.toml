[package]
name = "zguide-tokio-11-freelance"
version = "0.0.0"
edition.workspace = true
publish = false

[dependencies]
omq = { version = "0.11.1", path = "../../../omq", default-features = false, features = ["tokio-backend"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time"] }
bytes = "1"

[[bin]]
name = "zg11_server"
path = "server.rs"

[[bin]]
name = "zg11_client_sequential"
path = "client_sequential.rs"

[[bin]]
name = "zg11_client_shotgun"
path = "client_shotgun.rs"

[[bin]]
name = "zg11_client_tracked"
path = "client_tracked.rs"



[lints]
workspace = true
