[package]
name = "zguide-tokio-06-last-value-cache"
version = "0.0.0"
edition.workspace = true
publish = false

[dependencies]
omq = { version = "0.12.1", path = "../../../omq", default-features = false, features = ["tokio-backend"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time"] }
bytes = "1"

[[bin]]
name = "zg06_cache"
path = "cache.rs"

[[bin]]
name = "zg06_publisher"
path = "publisher.rs"

[[bin]]
name = "zg06_subscriber"
path = "subscriber.rs"



[lints]
workspace = true
