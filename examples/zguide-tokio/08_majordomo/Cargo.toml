[package]
name = "zguide-tokio-08-majordomo"
version = "0.0.0"
edition.workspace = true
publish = false

[dependencies]
omq = { version = "0.8.0", path = "../../../omq", default-features = false, features = ["tokio-backend"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time"] }
bytes = "1"

[[bin]]
name = "zg08_broker"
path = "broker.rs"

[[bin]]
name = "zg08_worker"
path = "worker.rs"

[[bin]]
name = "zg08_client"
path = "client.rs"



[lints]
workspace = true
