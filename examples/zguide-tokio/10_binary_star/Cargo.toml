[package]
name = "zguide-tokio-10-binary-star"
version = "0.0.0"
edition.workspace = true
publish = false

[dependencies]
omq = { version = "0.10.0", path = "../../../omq", default-features = false, features = ["tokio-backend"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time"] }
bytes = "1"

[[bin]]
name = "zg10_primary"
path = "primary.rs"

[[bin]]
name = "zg10_backup"
path = "backup.rs"

[[bin]]
name = "zg10_client"
path = "client.rs"



[lints]
workspace = true
