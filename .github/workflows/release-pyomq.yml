name: Release pyomq

on:
  push:
    tags:
      - 'pyomq-v*'

permissions:
  contents: read

jobs:
  linux:
    name: Linux wheels (${{ matrix.target }}, ${{ matrix.manylinux }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
        manylinux: [auto, musllinux_1_2]
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          command: build
          args: --release --out dist
          working-directory: bindings/pyomq
          manylinux: ${{ matrix.manylinux }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}-${{ matrix.manylinux }}
          path: bindings/pyomq/dist

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: bindings/pyomq
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: bindings/pyomq/dist

  smoke-test:
    name: Smoke test (x86_64 wheel)
    runs-on: ubuntu-latest
    needs: [linux]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/download-artifact@v4
        with:
          name: wheels-linux-x86_64-auto
          path: dist
      - run: pip install dist/*.whl pytest
      - run: pytest bindings/pyomq/tests/test_basic.py bindings/pyomq/tests/test_curve.py bindings/pyomq/tests/test_plain.py -v -p no:asyncio

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [linux, sdist, smoke-test]
    environment:
      name: pypi
      url: https://pypi.org/p/pyomq
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
