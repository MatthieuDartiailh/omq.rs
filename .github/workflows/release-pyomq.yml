name: Release pyomq

on:
  push:
    tags:
      - 'pyomq-v*'

permissions:
  contents: read

jobs:
  linux:
    name: Linux wheels (${{ matrix.target }}, ${{ matrix.manylinux }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
        manylinux: [auto, musllinux_1_2]
    steps:
      - uses: actions/checkout@v7
      - name: Disable local CPU rustflags
        run: rm -f .cargo/config.toml
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          command: build
          args: --release --out dist
          working-directory: bindings/pyomq
          manylinux: ${{ matrix.manylinux }}
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target }}-${{ matrix.manylinux }}
          path: bindings/pyomq/dist

  windows:
    name: Windows wheels (${{ matrix.platform.target }}, ${{ matrix.platform.python_arch }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
            python_arch: x64
          - runner: windows-11-arm
            target: aarch64
            python_arch: arm64
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: 3.14
          architecture: ${{ matrix.platform.python_arch }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          working-directory: bindings/pyomq
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: bindings/pyomq/dist

  macos:
    name: macOS wheels (${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          working-directory: bindings/pyomq
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: bindings/pyomq/dist

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Disable local CPU rustflags
        run: rm -f .cargo/config.toml
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: bindings/pyomq
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: bindings/pyomq/dist

  smoke-test:
    name: Smoke test (x86_64 wheel)
    runs-on: ubuntu-latest
    needs: [linux]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: actions/download-artifact@v7
        with:
          name: wheels-linux-x86_64-auto
          path: dist
      - run: pip install dist/*.whl pytest
      - run: pytest bindings/pyomq/tests/test_basic.py bindings/pyomq/tests/test_curve.py bindings/pyomq/tests/test_plain.py -v -p no:asyncio

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [linux, windows, macos, sdist, smoke-test]
    environment:
      name: pypi
      url: https://pypi.org/p/pyomq
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
