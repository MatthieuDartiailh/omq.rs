name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      test_matrix: ${{ steps.matrix.outputs.test_matrix }}
      os_matrix: ${{ steps.matrix.outputs.os_matrix }}
      run_pyomq: ${{ steps.matrix.outputs.run_pyomq }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          predicate-quantifier: every
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!**/*.svg'
              - '!**/*.py'
              - '!doc/**'
      - id: matrix
        run: |
          echo 'test_matrix={"include":[{"toolchain":"stable","os":"ubuntu-latest"},{"toolchain":"stable","os":"ubuntu-24.04-arm"},{"toolchain":"stable","os":"macos-15-intel"},{"toolchain":"stable","os":"macos-15"},{"toolchain":"1.93","os":"ubuntu-latest"},{"toolchain":"stable","os":"windows-latest","target":"x86_64-pc-windows-msvc"}]}' >> "$GITHUB_OUTPUT"
          echo 'os_matrix={"os":["ubuntu-latest","macos-15-intel","macos-15","windows-latest"]}' >> "$GITHUB_OUTPUT"
          echo 'run_pyomq=true' >> "$GITHUB_OUTPUT"

  test:
    name: cargo test (${{ matrix.toolchain }}, ${{ matrix.os }})
    needs: [changes, lint]
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.test_matrix) }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          targets: ${{ matrix.target || '' }}
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        if: runner.os != 'macOS'
        run: cargo test --workspace --no-fail-fast
      - name: cargo test (macOS)
        if: runner.os == 'macOS'
        run: cargo test --workspace --no-fail-fast -- --test-threads=1

  encryption:
    name: encryption (curve, ${{ matrix.os }})
    needs: [changes, lint]
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.os_matrix) }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (curve)
        if: runner.os != 'macOS'
        run: cargo test -p omq-tokio --features curve
      - name: cargo test (curve, macOS)
        if: runner.os == 'macOS'
        run: cargo test -p omq-tokio --features curve -- --test-threads=1

  compression:
    name: compression (${{ matrix.os }})
    needs: [changes, lint]
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.os_matrix) }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (lz4)
        if: runner.os != 'macOS'
        run: cargo test -p omq-tokio --features lz4
      - name: cargo test (lz4, macOS)
        if: runner.os == 'macOS'
        run: cargo test -p omq-tokio --features lz4 -- --test-threads=1

  linux-32bit:
    name: 32-bit linux (${{ matrix.target }})
    needs: [changes, lint]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - i686-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93"
      - uses: taiki-e/install-action@v2
        with:
          tool: cross
      - uses: Swatinem/rust-cache@v2
      - name: compile workspace
        run: cross check --target ${{ matrix.target }} --workspace --all-targets --all-features
      - name: yring tests
        run: cross test --target ${{ matrix.target }} -p yring --all-features
      - name: tokio tcp smoke tests
        run: cross test --target ${{ matrix.target }} -p omq-tokio --test omq_tcp_smoke
      - name: proto lz4 tests
        run: cross test --target ${{ matrix.target }} -p omq-proto --features lz4 --lib
      - name: libzmq ABI and inproc tests
        run: |
          cross test --target ${{ matrix.target }} -p omq-libzmq --test omq_libzmq_ctx
          cross test --target ${{ matrix.target }} -p omq-libzmq --test omq_libzmq_multipart
          cross test --target ${{ matrix.target }} -p omq-libzmq --test omq_libzmq_proxy
          cross test --target ${{ matrix.target }} -p omq-libzmq --test omq_libzmq_draft

  lint:
    name: fmt + clippy
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.os_matrix) }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - name: clippy (Linux)
        if: runner.os == 'Linux'
        run: cargo clippy --workspace --all-targets --all-features
      - name: clippy (Windows)
        if: runner.os == 'Windows'
        run: cargo clippy --workspace --all-targets --all-features
      - name: clippy (macOS)
        if: runner.os == 'macOS'
        run: cargo clippy --workspace --all-targets --all-features

  pyomq:
    name: pyomq
    needs: [changes, lint]
    if: needs.changes.outputs.code == 'true' && needs.changes.outputs.run_pyomq == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v6
        with: { python-version: "3.14" }
      - name: create virtualenv and install python deps
        working-directory: bindings/pyomq
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install --group test
      - name: build pyomq
        working-directory: bindings/pyomq
        run: .venv/bin/pip install .
      - name: pytest
        working-directory: bindings/pyomq
        run: .venv/bin/pytest -v -k "not test_perf"

  ci-success:
    name: CI success
    needs: [changes, test, encryption, compression, linux-32bit, lint, pyomq]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: check all jobs passed or were skipped
        run: |
          if [[ '${{ toJSON(needs.*.result) }}' =~ (failure|cancelled) ]]; then
            exit 1
          fi
