name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '!**/*.md'
              - '!doc/**'

  test:
    name: cargo test (${{ matrix.toolchain }}, ${{ matrix.os }})
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, "1.93"]
        os: [ubuntu-latest, ubuntu-24.04-arm]
        exclude:
          - toolchain: "1.93"
            os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
      - name: workspace tests (default features)
        run: cargo test --workspace

  encryption:
    name: encryption (curve + blake3zmq)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p omq-tokio  --features curve
      - run: cargo test -p omq-compio --features curve
      - run: cargo test -p omq-tokio  --features blake3zmq
      - run: cargo test -p omq-compio --features blake3zmq

  compression:
    name: compression (lz4 + zstd)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p omq-tokio  --features lz4
      - run: cargo test -p omq-compio --features lz4
      - run: cargo test -p omq-tokio  --features zstd
      - run: cargo test -p omq-compio --features zstd

  priority:
    name: priority
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p omq-tokio  --features priority
      - run: cargo test -p omq-compio --features priority

  facade:
    name: omq facade
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p omq
      - run: cargo test -p omq --no-default-features --features tokio-backend

  fmt:
    name: rustfmt
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt }
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy }
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets

  interop:
    name: interop (ruby + pyomq)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: "4.0" }
      - name: install omq-cli
        run: gem install omq-cli
      - name: rust ↔ ruby interop (tokio)
        run: cargo test -p omq-tokio  --test interop_ruby
      - name: rust ↔ ruby interop (compio)
        run: cargo test -p omq-compio --test interop_ruby
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - name: create virtualenv and install python deps
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin pytest pytest-asyncio pyzmq
      - name: build pyomq
        working-directory: bindings/pyomq
        run: ../../.venv/bin/maturin develop --release
      - name: pytest
        working-directory: bindings/pyomq
        run: ../../.venv/bin/pytest -v -k "not test_perf"

  ci-success:
    name: CI success
    needs: [changes, test, encryption, compression, priority, facade, fmt, clippy, interop]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: check all jobs passed or were skipped
        run: |
          if [[ '${{ toJSON(needs.*.result) }}' =~ (failure|cancelled) ]]; then
            exit 1
          fi
