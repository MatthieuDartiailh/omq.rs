name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: cargo test (${{ matrix.toolchain }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, "1.93"]
        os: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
      - name: workspace tests (default features)
        run: cargo test --workspace

  feature-matrix:
    name: feature ${{ matrix.feature }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        feature: [curve, blake3zmq, lz4, zstd, priority]
        os: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p omq-tokio  --features ${{ matrix.feature }}
      - run: cargo test -p omq-compio --features ${{ matrix.feature }}

  facade:
    name: omq facade (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p omq
      - run: cargo test -p omq --no-default-features --features tokio-backend

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt }
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy }
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets

  clippy-examples:
    name: clippy (zguide examples)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy }
      - uses: Swatinem/rust-cache@v2
      - name: clippy (zguide-compio)
        working-directory: examples/zguide-compio
        run: cargo clippy --workspace --all-targets
      - name: clippy (zguide-tokio)
        working-directory: examples/zguide-tokio
        run: cargo clippy --workspace --all-targets

  pyomq:
    name: pyomq + pyzmq interop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - name: create virtualenv and install python deps
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin pytest pytest-asyncio pyzmq
      - name: build pyomq
        working-directory: bindings/pyomq
        run: ../../.venv/bin/maturin develop --release
      - name: pytest
        working-directory: bindings/pyomq
        run: ../../.venv/bin/pytest -v -k "not test_perf"

  ruby-interop:
    name: ruby omq interop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: "4.0" }
      - name: install omq-cli
        run: gem install omq-cli
      - name: verify omq version
        run: omq --version
      - name: rust ↔ ruby interop (tokio)
        run: cargo test -p omq-tokio  --test interop_ruby
      - name: rust ↔ ruby interop (compio)
        run: cargo test -p omq-compio --test interop_ruby
