name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          predicate-quantifier: every
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!**/*.svg'
              - '!**/*.py'
              - '!doc/**'

  test:
    name: cargo test (${{ matrix.toolchain }}, ${{ matrix.os }})
    needs: [changes, lint]
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - toolchain: stable
            os: ubuntu-latest
          - toolchain: stable
            os: ubuntu-24.04-arm
          - toolchain: stable
            os: macos-15-intel
          - toolchain: "1.93"
            os: ubuntu-latest
          - toolchain: stable
            os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          targets: ${{ matrix.target || '' }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --no-fail-fast

  encryption:
    name: encryption (curve, ${{ matrix.os }})
    needs: [changes, lint]
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p omq-tokio --features curve

  compression:
    name: compression (${{ matrix.os }})
    needs: [changes, lint]
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p omq-tokio --features lz4

  lint:
    name: fmt + clippy
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt, clippy }
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - name: clippy (Linux)
        if: runner.os == 'Linux'
        run: cargo clippy --workspace --all-targets --all-features
      - name: clippy (Windows)
        if: runner.os == 'Windows'
        run: cargo clippy --workspace --all-targets --all-features
      - name: clippy (macOS)
        if: runner.os == 'macOS'
        run: cargo clippy --workspace --all-targets --all-features

  pyomq:
    name: pyomq
    needs: [changes, lint]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v6
        with: { python-version: "3.14" }
      - name: create virtualenv and install python deps
        working-directory: bindings/pyomq
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install --group test
      - name: build pyomq
        working-directory: bindings/pyomq
        run: .venv/bin/pip install .
      - name: pytest
        working-directory: bindings/pyomq
        run: .venv/bin/pytest -v -k "not test_perf"

  ci-success:
    name: CI success
    needs: [changes, test, encryption, compression, lint, pyomq]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: check all jobs passed or were skipped
        run: |
          if [[ '${{ toJSON(needs.*.result) }}' =~ (failure|cancelled) ]]; then
            exit 1
          fi
