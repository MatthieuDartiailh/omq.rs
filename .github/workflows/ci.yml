name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '!**/*.md'
              - '!**/*.svg'
              - '!**/*.py'
              - '!doc/**'

  test:
    name: cargo test (${{ matrix.toolchain }}, ${{ matrix.os }})
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - toolchain: stable
            os: ubuntu-latest
          - toolchain: stable
            os: ubuntu-24.04-arm
          - toolchain: "1.93"
            os: ubuntu-latest
          - toolchain: stable
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - toolchain: stable
            os: windows-latest
            target: x86_64-pc-windows-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          targets: ${{ matrix.target || '' }}
      - uses: Swatinem/rust-cache@v2
      - name: Linux workspace tests (default features)
        if: runner.os != 'Windows'
        run: cargo test --workspace --exclude omq-compio
      - name: Windows workspace tests (default features)
        if: runner.os == 'Windows'
        run: cargo test --workspace --exclude omq-compio --exclude omq-libzmq

  encryption:
    name: encryption (curve + blake3zmq, ${{ matrix.os }})
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p omq-tokio --features curve
      - run: cargo test -p omq-tokio --features blake3zmq

  compression:
    name: compression (${{ matrix.os }})
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p omq-tokio --features lz4


  lint:
    name: fmt + clippy
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt, clippy }
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - name: Linux workspace tests (default features)
        if: runner.os != 'Windows'
        run: cargo clippy --workspace --all-targets --exclude omq-compio
      - name: Windows workspace tests (default features)
        if: runner.os == 'Windows'
        run: cargo clippy --workspace --all-targets --exclude omq-compio --exclude omq-libzmq

  interop:
    name: interop (${{ matrix.os }})
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: "4.0" }
      - name: install omq-cli
        run: gem install omq-cli
      - name: rust ↔ ruby interop (tokio)
        run: cargo test -p omq-tokio --test interop_ruby
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - name: create virtualenv and install python deps (Linux)
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin pytest pytest-asyncio pyzmq
      - name: build pyomq
        working-directory: bindings/pyomq
        run: ../../.venv/bin/maturin develop --release
      - name: pytest
        working-directory: bindings/pyomq
        run: ../../.venv/bin/pytest -v -k "not test_perf"

  ci-success:
    name: CI success
    needs: [changes, test, encryption, compression, lint, interop]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: check all jobs passed or were skipped
        run: |
          if [[ '${{ toJSON(needs.*.result) }}' =~ (failure|cancelled) ]]; then
            exit 1
          fi
