name: soak

on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC daily
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  soak:
    name: soak (${{ matrix.backend }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [omq-compio, omq-tokio]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build soak tests
        run: |
          cargo test -p ${{ matrix.backend }} \
            --features "soak lz4 zstd plain curve blake3zmq priority" \
            --release --no-run
      - name: run soak tests
        run: |
          FEATURES="soak lz4 zstd plain curve blake3zmq priority"
          TESTS=(blake3zmq compression compression_lz4 curve
                 inproc_cross_thread large_throughput multi_socket peer_churn
                 plain priority pub_sub_churn reconnect_storm)
          for test in "${TESTS[@]}"; do
            OMQ_SOAK_DURATION_SECS=60 cargo test -p ${{ matrix.backend }} \
              --features "$FEATURES" --release --test "soak_${test}" \
              -- --nocapture
          done
