[package]
name = "omq-proto"
version = "0.15.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Sans-I/O ZMTP codec, message types, and routing logic. Backend-agnostic core for omq-tokio / omq-compio."
readme = "README.md"
keywords = ["zeromq", "high-performance", "protocol", "codec", "sans-io"]
categories = ["network-programming", "parser-implementations"]

[lints]
workspace = true

[features]
# Minimal default: NULL mechanism + TCP / IPC / inproc / UDP only.
# No C compiler required, no crypto deps. Opt in to features:
#   curve     CURVE encrypted-handshake (RFC 26)
#   blake3zmq omq-native BLAKE3+ChaCha20 mechanism
#   lz4       lz4+tcp:// transport (bundles liblz4; needs cc)
#   zstd      zstd+tcp:// transport (bundles libzstd; needs cc)
#   priority  strict per-pipe priority on connect_with
default = []
curve = ["dep:crypto_box", "dep:crypto_secretbox", "dep:subtle", "dep:x25519-dalek", "dep:zeroize"]
blake3zmq = [
    "dep:blake3",
    "dep:chacha20-blake3",
    "dep:x25519-dalek",
    "dep:zeroize",
]
plain = []
lz4 = ["dep:lz4-sys"]
zstd = ["dep:zstd-safe"]
ws = []
priority = []

[dependencies]
blake3 = { version = "1", optional = true }
bytes = "1.11.0"
# Full AVX2 throughput (~1 GiB/s) requires `-C target-cpu=native` (or
# `-C target-feature=+avx2`). Without it the scalar path runs ~55 MiB/s on
# AVX2 hardware. Set RUSTFLAGS="-C target-cpu=native" for production builds.
# Switch to upstream skerkour/chacha20-blake3 once PR #12 is merged + published.
chacha20-blake3 = { version = "0.9.13", optional = true }
crypto_box = { version = "0.9", features = ["std"], optional = true }
crypto_secretbox = { version = "0.1", optional = true }
subtle = { version = "2", optional = true }
x25519-dalek = { version = "2", features = ["static_secrets", "getrandom"], optional = true }
lz4-sys = { version = "1", optional = true }
rand = "0.10"
zstd-safe = { version = "7", default-features = false, features = ["std", "zdict_builder"], optional = true }
patricia_tree = "0.10"
smallvec = { version = "1", features = ["const_generics", "union"] }
socket2 = { version = "0.6", features = ["all"] }
thiserror = "2.0.18"
zeroize = { version = "1.8.0", features = ["zeroize_derive"], optional = true }

[[bench]]
name = "mechanism_frame"
harness = false
required-features = ["curve", "blake3zmq"]

[package.metadata.docs.rs]
all-features = true
